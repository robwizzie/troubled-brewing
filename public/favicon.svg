<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Trouble Brewing tab mark: the brass fox medallion from Motifs.jsx,
       seated on the shop's deep-green wall so it reads at 16px. -->
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c35e"/>
      <stop offset="0.5" stop-color="#c9962f"/>
      <stop offset="1" stop-color="#9c6f22"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#545f33"/>
  <circle cx="50" cy="52" r="42" fill="url(#brass)"/>
  <circle cx="50" cy="52" r="42" fill="none" stroke="#7c561a" stroke-width="2" opacity="0.5"/>
  <!-- ears -->
  <path d="M29 30 L45 44 L26 49 Z" fill="#3a2a12"/>
  <path d="M71 30 L55 44 L74 49 Z" fill="#3a2a12"/>
  <!-- head -->
  <path d="M27 47 L50 38 L73 47 L64 66 L50 78 L36 66 Z" fill="#fbeccb"/>
  <!-- cheeks -->
  <path d="M27 47 L36 66 L42 59 L36 50 Z" fill="#e9c35e"/>
  <path d="M73 47 L64 66 L58 59 L64 50 Z" fill="#e9c35e"/>
  <!-- snout -->
  <path d="M41 61 L59 61 L50 76 Z" fill="#fff7e6"/>
  <!-- eyes + nose -->
  <path d="M39 52 l6 3 -6 3 Z" fill="#2a1d0c"/>
  <path d="M61 52 l-6 3 6 3 Z" fill="#2a1d0c"/>
  <path d="M46 64 L54 64 L50 70 Z" fill="#2a1d0c"/>
  <!-- top hat tip -->
  <rect x="43" y="19" width="14" height="8" rx="1" fill="#2a1d0c"/>
  <rect x="39" y="26" width="22" height="3" rx="1.5" fill="#2a1d0c"/>
</svg>
