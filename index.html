<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta (per-page values are managed at runtime via the `pages` table + <SEO/>) -->
    <title>Trouble Brewing Coffee House — Haddon Heights, NJ</title>
    <meta
      name="description"
      content="Trouble Brewing Coffee House — a warm, independent coffee shop in Haddon Heights, NJ pouring La Colombe coffee. Espresso, signature drinks, fresh paninis, and pastries."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="business.business" />
    <meta property="og:title" content="Trouble Brewing Coffee House" />
    <meta
      property="og:description"
      content="A warm, independent coffee shop in Haddon Heights, NJ pouring La Colombe coffee."
    />
    <meta property="og:url" content="https://troublebrewingcoffeehouse.com/" />
    <meta property="og:image" content="https://troublebrewingcoffeehouse.com/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      SPA routing fix for GitHub Pages (spa-github-pages technique).
      404.html redirects deep links to index.html with the path encoded in the query
      string; this snippet decodes it back before React Router boots. See docs/DEPLOYMENT.md.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>

    <!-- Fonts: characterful display serif + clean sans (swappable in tokens.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
