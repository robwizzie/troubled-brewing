name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages.
# Pages source must be set to "GitHub Actions" (Settings → Pages).
# Env values come from repository secrets — see docs/DEPLOYMENT.md.

on:
  push:
    # `main` is the long-term target; the second entry auto-deploys the current
    # working branch so previews go live on push. Remove it once you merge to main.
    branches: [main, claude/dreamy-hamilton-zzzvbh]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # The anon key is safe to ship (gated by RLS). Service role key is NEVER here.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_SPOTON_ORDER_URL: ${{ secrets.VITE_SPOTON_ORDER_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
